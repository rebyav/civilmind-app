<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CivilMind — AI for Engineers</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1c1e21; --surface: #23262b; --surface2: #2a2e34;
    --border: #33383f; --accent: #a8f542; --accent2: #42f5a7;
    --text: #f0f0f0; --muted: #9aa0aa;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 20px; border-bottom: 1px solid var(--border); background: var(--surface); flex-shrink: 0; gap: 10px; }
  .logo { font-family: 'Syne', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: -0.5px; display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .logo-dot { width: 9px; height: 9px; background: var(--accent); border-radius: 50%; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.6;transform:scale(0.8)} }
  .header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .header-btn { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 4px 8px; border-radius: 4px; cursor: pointer; transition: all 0.15s; white-space: nowrap; }
  .header-btn:hover { color: var(--text); border-color: var(--muted); }
  .header-btn.connected { color: var(--accent); border-color: rgba(168,245,66,0.3); }
  .length-toggle { display: flex; background: var(--surface2); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
  .length-btn { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: transparent; border: none; padding: 4px 8px; cursor: pointer; transition: all 0.15s; }
  .length-btn.active { background: rgba(168,245,66,0.12); color: var(--accent); }
  .sidebar-toggle { display: none; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted); padding: 4px 8px; cursor: pointer; font-size: 14px; }
  .main { display: flex; flex: 1; overflow: hidden; position: relative; }
  .sidebar { width: 240px; border-right: 1px solid var(--border); background: var(--surface); display: flex; flex-direction: column; overflow: hidden; flex-shrink: 0; transition: transform 0.25s ease; }
  .sidebar-header { padding: 14px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
  .sidebar-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; }
  .new-chat-btn { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(168,245,66,0.08); border: 1px solid rgba(168,245,66,0.2); padding: 3px 8px; border-radius: 4px; cursor: pointer; transition: all 0.15s; }
  .new-chat-btn:hover { background: rgba(168,245,66,0.15); }
  .sessions-list { flex: 1; overflow-y: auto; padding: 8px; }
  .sessions-list::-webkit-scrollbar { width: 4px; }
  .sessions-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .session-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; margin-bottom: 4px; transition: all 0.15s; border: 1px solid transparent; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .session-item:hover { background: var(--surface2); border-color: var(--border); }
  .session-item.active { background: rgba(168,245,66,0.08); border-color: rgba(168,245,66,0.2); }
  .session-info { flex: 1; min-width: 0; }
  .session-title { font-size: 12px; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 2px; }
  .session-item.active .session-title { color: var(--accent); }
  .session-date { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); }
  .session-delete { font-size: 12px; color: var(--muted); opacity: 0; transition: opacity 0.15s; flex-shrink: 0; padding: 2px 4px; border-radius: 3px; }
  .session-item:hover .session-delete { opacity: 1; }
  .session-delete:hover { color: #ff6b6b; background: rgba(255,107,107,0.1); }
  .no-sessions { padding: 24px 16px; text-align: center; font-size: 12px; color: var(--muted); line-height: 1.6; }
  .chat-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; min-width: 0; }
  .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  .welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; text-align: center; gap: 12px; padding: 24px 16px; }
  .welcome-icon { width: 52px; height: 52px; background: rgba(168,245,66,0.1); border: 1px solid rgba(168,245,66,0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 4px; }
  .welcome h2 { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 700; }
  .welcome p { font-size: 13px; color: var(--muted); max-width: 380px; line-height: 1.6; }
  .suggested-questions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; width: 100%; max-width: 580px; }
  .suggested-q { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; text-align: left; cursor: pointer; transition: all 0.15s; font-size: 12px; color: var(--text); line-height: 1.4; font-family: 'DM Sans', sans-serif; }
  .suggested-q:hover { border-color: rgba(168,245,66,0.3); background: rgba(168,245,66,0.04); color: var(--accent); }
  .suggested-q-icon { font-size: 14px; margin-bottom: 4px; display: block; }
  .message { display: flex; gap: 12px; animation: fadeUp 0.3s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  .message.user { flex-direction: row-reverse; }
  .avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500; }
  .avatar.ai { background: rgba(168,245,66,0.1); border: 1px solid rgba(168,245,66,0.2); color: var(--accent); }
  .avatar.user-av { background: rgba(66,245,167,0.1); border: 1px solid rgba(66,245,167,0.2); color: var(--accent2); }
  .bubble { max-width: 680px; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.7; min-width: 0; word-break: break-word; }
  .message.ai .bubble { background: var(--surface); border: 1px solid var(--border); border-top-left-radius: 4px; }
  .message.user .bubble { background: rgba(168,245,66,0.08); border: 1px solid rgba(168,245,66,0.15); border-top-right-radius: 4px; }
  .bubble-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 10px; flex-wrap: wrap; gap: 6px; }
  .source-tags { display: flex; flex-wrap: wrap; gap: 4px; flex: 1; }
  .source-tag { display: inline-flex; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); background: rgba(168,245,66,0.06); border: 1px solid rgba(168,245,66,0.15); padding: 2px 6px; border-radius: 3px; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .copy-btn { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); background: transparent; border: 1px solid var(--border); padding: 2px 8px; border-radius: 3px; cursor: pointer; transition: all 0.15s; flex-shrink: 0; }
  .copy-btn:hover, .copy-btn.copied { color: var(--accent); border-color: rgba(168,245,66,0.3); }
  .disclaimer { font-size: 11px; color: var(--muted); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); font-style: italic; }
  .evidence-block { margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--border); }
  .evidence-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 6px; }
  .evidence-quote { background: rgba(168,245,66,0.04); border-left: 3px solid rgba(168,245,66,0.4); border-radius: 0 6px 6px 0; padding: 8px 12px; margin-bottom: 6px; font-size: 12px; line-height: 1.6; }
  .evidence-quote em { color: var(--text); font-style: italic; }
  .evidence-source { display: block; margin-top: 4px; font-family: 'DM Mono', monospace; font-size: 10px; color: var(--accent); }
  .typing { display: flex; gap: 4px; align-items: center; }
  .typing-dot { width: 6px; height: 6px; background: var(--accent); border-radius: 50%; animation: typingAnim 1.2s infinite; }
  .typing-dot:nth-child(2) { animation-delay: 0.2s; }
  .typing-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes typingAnim { 0%,100%{opacity:0.3;transform:scale(0.8)} 50%{opacity:1;transform:scale(1)} }
  .input-area { padding: 14px 20px; border-top: 1px solid var(--border); background: var(--surface); }
  .input-wrapper { display: flex; gap: 10px; align-items: flex-end; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 10px 14px; transition: border-color 0.2s; }
  .input-wrapper:focus-within { border-color: rgba(168,245,66,0.3); }
  textarea { flex: 1; background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 14px; line-height: 1.5; resize: none; max-height: 120px; min-height: 24px; }
  textarea::placeholder { color: var(--muted); }
  .send-btn { width: 34px; height: 34px; background: var(--accent); border: none; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.15s; }
  .send-btn:hover { background: #b8f555; transform: scale(1.05); }
  .send-btn:active { transform: scale(0.95); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 15px; height: 15px; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 100; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 28px; width: 440px; max-width: 92vw; }
  .modal h3 { font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--muted); margin-bottom: 18px; line-height: 1.6; }
  .modal input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
  .modal input:focus { border-color: rgba(168,245,66,0.4); }
  .modal input::placeholder { color: var(--muted); }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  .modal-btn { font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.15s; }
  .modal-btn.primary { background: var(--accent); color: #1c1e21; font-weight: 500; }
  .modal-btn.primary:hover { background: #b8f555; }
  .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 40; }
  @media (max-width: 640px) {
    header { padding: 10px 14px; }
    .logo { font-size: 16px; }
    .sidebar-toggle { display: block; }
    .sidebar { position: fixed; top: 0; left: 0; bottom: 0; z-index: 50; transform: translateX(-100%); width: 260px; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-overlay.open { display: block; }
    .messages { padding: 12px 10px; gap: 14px; }
    .bubble { font-size: 13px; padding: 10px 12px; }
    .suggested-questions { grid-template-columns: 1fr; }
    .input-area { padding: 10px 12px; }
    .length-toggle { display: none; }
    .avatar { width: 26px; height: 26px; font-size: 9px; }
  }
</style>
</head>
<body>

<div class="modal-overlay" id="pinModal">
  <div class="modal">
    <h3>🔒 Enter PIN</h3>
    <p>Enter your access PIN to use CivilMind.</p>
    <input type="password" id="pinInput" placeholder="••••" maxlength="10" onkeydown="if(event.key==='Enter') checkPin()"/>
    <div id="pinError" style="color:#ff6b6b;font-size:12px;margin-bottom:12px;display:none">Incorrect PIN. Try again.</div>
    <div class="modal-actions">
      <button class="modal-btn primary" onclick="checkPin()">Unlock</button>
    </div>
  </div>
</div>

<header>
  <div style="display:flex;align-items:center;gap:8px">
    <button class="sidebar-toggle" onclick="toggleSidebar()">☰</button>
    <div class="logo"><div class="logo-dot"></div>CivilMind</div>
  </div>
  <div class="header-right">
    <div class="length-toggle">
      <button class="length-btn active" id="btnShort" onclick="setLength('short')">Short</button>
      <button class="length-btn" id="btnDetailed" onclick="setLength('detailed')">Detailed</button>
    </div>
    <button class="header-btn connected" id="connectBtn">✅ Connected</button>
  </div>
</header>

<div class="main">
  <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>
  <div class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <span class="sidebar-label">Chats</span>
      <button class="new-chat-btn" onclick="newChat()">+ New</button>
    </div>
    <div class="sessions-list" id="sessionsList">
      <div class="no-sessions">No chats yet.<br>Ask something to get started.</div>
    </div>
  </div>

  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⚙️</div>
        <h2>Ask your senior engineer</h2>
        <p>Get instant, document-backed answers from council specs and Australian engineering standards.</p>
        <div class="suggested-questions">
          <button class="suggested-q" onclick="askSuggested(this)"><span class="suggested-q-icon">🚧</span>What are the kerb requirements for a DDA ramp in City of Sydney?</button>
          <button class="suggested-q" onclick="askSuggested(this)"><span class="suggested-q-icon">💧</span>What stormwater drainage standards apply to a new road in Sydney?</button>
          <button class="suggested-q" onclick="askSuggested(this)"><span class="suggested-q-icon">🛣️</span>What does Austroads say about minimum sight distance at an intersection?</button>
          <button class="suggested-q" onclick="askSuggested(this)"><span class="suggested-q-icon">🔩</span>What are the asphalt compaction requirements for a local road?</button>
          <button class="suggested-q" onclick="askSuggested(this)"><span class="suggested-q-icon">🔄</span>What are the TfNSW requirements for roundabout design?</button>
          <button class="suggested-q" onclick="askSuggested(this)"><span class="suggested-q-icon">🏗️</span>What are the Sydney Water requirements for sewer design in a basement?</button>
        </div>
      </div>
    </div>
    <div class="input-area">
      <div class="input-wrapper">
        <textarea id="questionInput" placeholder="Ask an engineering question..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendQuestion()">
          <svg viewBox="0 0 24 24" fill="none" stroke="#1c1e21" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"></line>
            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
          </svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
  const BACKEND_URL = 'https://civilmind-production.up.railway.app';
  const CORRECT_PIN = '2580';
  const PIN_KEY = 'civilmind_pin_ok';
  const SESSIONS_KEY = 'civilmind_sessions';

  let isLoading = false;
  let answerLength = 'short';
  let conversationHistory = [];
  let sessions = {};
  let activeSessionId = null;

  function renderMarkdown(text) {
    const evidenceSplit = text.split(/\n?---\n📄 EVIDENCE\n/);
    const mainText = evidenceSplit[0];
    const evidenceText = evidenceSplit[1] || null;
    let html = mainText
      .replace(/^### (.+)$/gm, '<h4 style="margin:12px 0 6px;font-family:Syne,sans-serif;font-size:13px;color:var(--accent)">$1</h4>')
      .replace(/^## (.+)$/gm, '<h3 style="margin:14px 0 8px;font-family:Syne,sans-serif;font-size:15px;color:var(--accent)">$1</h3>')
      .replace(/^# (.+)$/gm, '<h2 style="margin:16px 0 8px;font-family:Syne,sans-serif;font-size:17px;color:var(--accent)">$1</h2>')
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/^\|(.+)\|$/gm, (match) => {
        if (match.includes('---')) return '';
        const cells = match.split('|').filter(c => c.trim());
        return '<tr>' + cells.map(c => `<td style="padding:6px 10px;border:1px solid var(--border);font-size:12px">${c.trim()}</td>`).join('') + '</tr>';
      })
      .replace(/(<tr>.*<\/tr>\n?)+/gs, (match) => `<table style="width:100%;border-collapse:collapse;margin:10px 0;font-size:12px">${match}</table>`)
      .replace(/^---$/gm, '<hr style="border:none;border-top:1px solid var(--border);margin:12px 0">')
      .replace(/^⚠️ (.+)$/gm, '<div style="background:rgba(255,200,0,0.08);border:1px solid rgba(255,200,0,0.2);border-radius:6px;padding:8px 12px;margin:8px 0;font-size:12px">⚠️ $1</div>')
      .replace(/^- (.+)$/gm, '<li style="margin:3px 0;padding-left:4px">$1</li>')
      .replace(/(<li.*<\/li>\n?)+/gs, (match) => `<ul style="margin:8px 0;padding-left:20px">${match}</ul>`)
      .replace(/^\d+\. (.+)$/gm, '<li style="margin:3px 0;padding-left:4px">$1</li>')
      .replace(/\n/g, '<br>');
    if (evidenceText) {
      const quoteLines = evidenceText.trim().split('\n').filter(l => l.trim().startsWith('>'));
      const quotesHtml = quoteLines.map(line => {
        const inner = line.replace(/^>\s*/, '');
        const dashIdx = inner.lastIndexOf(' — ');
        if (dashIdx !== -1) {
          const quote = inner.slice(0, dashIdx).replace(/^"|"$/g, '');
          const source = inner.slice(dashIdx + 3);
          return `<div class="evidence-quote"><em>"${quote}"</em><span class="evidence-source">📄 ${source}</span></div>`;
        }
        return `<div class="evidence-quote"><em>${inner}</em></div>`;
      }).join('');
      html += `<div class="evidence-block"><div class="evidence-label">📄 Evidence</div>${quotesHtml}</div>`;
    }
    return html;
  }

  function setLength(val) {
    answerLength = val;
    document.getElementById('btnShort').classList.toggle('active', val === 'short');
    document.getElementById('btnDetailed').classList.toggle('active', val === 'detailed');
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('open');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('open');
  }

  function checkPin() {
    const input = document.getElementById('pinInput').value.trim();
    if (input === CORRECT_PIN) {
      localStorage.setItem(PIN_KEY, '1');
      document.getElementById('pinModal').style.display = 'none';
    } else {
      document.getElementById('pinError').style.display = 'block';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();
    }
  }

  function loadSessions() {
    try { const saved = localStorage.getItem(SESSIONS_KEY); if (saved) sessions = JSON.parse(saved); } catch(e) {}
    renderSessionsList();
  }

  function saveSessions() {
    try { localStorage.setItem(SESSIONS_KEY, JSON.stringify(sessions)); } catch(e) {}
  }

  function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2); }

  function formatDate(ts) {
    const d = new Date(ts), now = new Date(), diff = now - d;
    if (diff < 60000) return 'Just now';
    if (diff < 3600000) return `${Math.floor(diff/60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff/3600000)}h ago`;
    return d.toLocaleDateString('en-AU', { day:'numeric', month:'short' });
  }

  function getSuggestedHTML() {
    const qs = [
      ['🚧','What are the kerb requirements for a DDA ramp in City of Sydney?'],
      ['💧','What stormwater drainage standards apply to a new road in Sydney?'],
      ['🛣️','What does Austroads say about minimum sight distance at an intersection?'],
      ['🔩','What are the asphalt compaction requirements for a local road?'],
      ['🔄','What are the TfNSW requirements for roundabout design?'],
      ['🏗️','What are the Sydney Water requirements for sewer design in a basement?'],
    ];
    return `<div class="suggested-questions">${qs.map(([icon,q]) => `<button class="suggested-q" onclick="askSuggested(this)"><span class="suggested-q-icon">${icon}</span>${q}</button>`).join('')}</div>`;
  }

  function renderSessionsList() {
    const list = document.getElementById('sessionsList');
    const ids = Object.keys(sessions).sort((a,b) => sessions[b].updatedAt - sessions[a].updatedAt);
    if (ids.length === 0) { list.innerHTML = '<div class="no-sessions">No chats yet.<br>Ask something to get started.</div>'; return; }
    list.innerHTML = ids.map(id => {
      const s = sessions[id], isActive = id === activeSessionId;
      return `<div class="session-item ${isActive?'active':''}" onclick="loadSession('${id}')"><div class="session-info"><div class="session-title">${s.title}</div><div class="session-date">${formatDate(s.updatedAt)}</div></div><span class="session-delete" onclick="deleteSession(event,'${id}')">✕</span></div>`;
    }).join('');
  }

  function newChat() {
    activeSessionId = null; conversationHistory = []; closeSidebar();
    document.getElementById('messages').innerHTML = `<div class="welcome" id="welcome"><div class="welcome-icon">⚙️</div><h2>Ask your senior engineer</h2><p>Get instant, document-backed answers from council specs and Australian engineering standards.</p>${getSuggestedHTML()}</div>`;
    renderSessionsList();
  }

  function loadSession(id) {
    activeSessionId = id; conversationHistory = []; closeSidebar();
    const session = sessions[id];
    const messagesEl = document.getElementById('messages');
    messagesEl.innerHTML = '';
    session.messages.forEach(msg => renderMessage(msg.role, msg.content, msg.sources, false));
    messagesEl.scrollTop = messagesEl.scrollHeight;
    renderSessionsList();
  }

  function deleteSession(e, id) {
    e.stopPropagation();
    if (!confirm('Delete this chat?')) return;
    delete sessions[id];
    if (activeSessionId === id) newChat();
    saveSessions(); renderSessionsList();
  }

  function ensureActiveSession(firstMessage) {
    if (!activeSessionId || !sessions[activeSessionId]) {
      const id = generateId();
      const title = firstMessage.length > 40 ? firstMessage.slice(0,40) + '…' : firstMessage;
      sessions[id] = { title, messages: [], updatedAt: Date.now() };
      activeSessionId = id;
    }
    return activeSessionId;
  }

  function addMessageToSession(role, content, sources) {
    if (!activeSessionId) return;
    sessions[activeSessionId].messages.push({ role, content, sources: sources || [] });
    sessions[activeSessionId].updatedAt = Date.now();
    saveSessions(); renderSessionsList();
  }

  function removeWelcome() { const w = document.getElementById('welcome'); if (w) w.remove(); }

  function copyAnswer(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
      btn.textContent = '✅ Copied'; btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
    }).catch(() => { btn.textContent = 'Failed'; setTimeout(() => { btn.textContent = 'Copy'; }, 2000); });
  }

  function renderMessage(role, content, sources, animate) {
    removeWelcome();
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    if (!animate) div.style.animation = 'none';
    const avatar = document.createElement('div');
    avatar.className = `avatar ${role === 'ai' ? 'ai' : 'user-av'}`;
    avatar.textContent = role === 'ai' ? 'AI' : 'YOU';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = renderMarkdown(content);
    if (role === 'ai') {
      const footer = document.createElement('div');
      footer.className = 'bubble-footer';
      if (sources && sources.length > 0) {
        const tagWrap = document.createElement('div');
        tagWrap.className = 'source-tags';
        tagWrap.innerHTML = sources.map(s => `<span class="source-tag" title="${s}">📄 ${s}</span>`).join('');
        footer.appendChild(tagWrap);
      } else { footer.appendChild(document.createElement('div')); }
      const copyBtn = document.createElement('button');
      copyBtn.className = 'copy-btn'; copyBtn.textContent = 'Copy';
      copyBtn.onclick = () => copyAnswer(copyBtn, content);
      footer.appendChild(copyBtn);
      bubble.appendChild(footer);
      if (sources && sources.length > 0) {
        const disc = document.createElement('div');
        disc.className = 'disclaimer';
        disc.textContent = 'Always verify with your senior engineer or CPEng before acting on this.';
        bubble.appendChild(disc);
      }
    }
    div.appendChild(avatar); div.appendChild(bubble);
    messagesEl.appendChild(div);
  }

  function addMessage(role, content, sources) {
    renderMessage(role, content, sources, true);
    addMessageToSession(role, content, sources);
    const m = document.getElementById('messages');
    m.scrollTop = m.scrollHeight;
  }

  function addTyping() {
    removeWelcome();
    const messagesEl = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message ai'; div.id = 'typing';
    const avatar = document.createElement('div');
    avatar.className = 'avatar ai'; avatar.textContent = 'AI';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="typing"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
    div.appendChild(avatar); div.appendChild(bubble);
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

  function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 120) + 'px'; }

  function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendQuestion(); } }

  function askSuggested(btn) {
    const lines = btn.innerText.trim().split('\n');
    const text = lines[lines.length - 1].trim();
    document.getElementById('questionInput').value = text;
    sendQuestion();
  }

  async function sendQuestion() {
    const input = document.getElementById('questionInput');
    const question = input.value.trim();
    if (!question || isLoading) return;
    ensureActiveSession(question);
    isLoading = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = ''; autoResize(input);
    addMessage('user', question, null);
    addTyping();
    const lengthInstruction = answerLength === 'detailed'
      ? 'Give a thorough, detailed answer with all relevant clauses and considerations.'
      : 'Give a concise, practical answer. Be direct and specific.';
    try {
      const res = await fetch(`${BACKEND_URL}/ask`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ question, history: conversationHistory, length: lengthInstruction })
      });
      if (!res.ok) throw new Error(`status:${res.status}`);
      const data = await res.json();
      removeTyping();
      addMessage('ai', data.answer, data.sources);
      conversationHistory.push({ role: 'user', content: question });
      conversationHistory.push({ role: 'assistant', content: data.answer });
    } catch(e) {
      removeTyping();
      const msg = e.message.includes('Failed to fetch')
        ? 'Cannot reach the server. Check your internet connection and try again.'
        : e.message.includes('500')
        ? 'The server hit an error processing your question. Try rephrasing it.'
        : 'Something went wrong. Please try again in a moment.';
      addMessage('ai', msg, []);
    }
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }

  window.addEventListener('load', () => {
    const pinOk = localStorage.getItem(PIN_KEY);
    if (pinOk) {
      document.getElementById('pinModal').style.display = 'none';
    } else {
      document.getElementById('pinModal').style.display = 'flex';
      setTimeout(() => document.getElementById('pinInput').focus(), 100);
    }
    loadSessions();
  });
</script>
</body>
</html>
